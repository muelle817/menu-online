<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel Cocina - Burger 817</title>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap');
    
    body { 
      font-family: 'Poppins', sans-serif; 
      background: #0f0f0f; 
      color: white; 
      margin: 0; 
      padding: 20px; 
    }
    h1 { 
      color: #ff8c00; 
      text-align: center; 
      margin-bottom: 10px;
      font-size: 2.8rem;
    }
    .order { 
      background: #1a1a1a; 
      margin: 20px auto;
      padding: 25px; 
      border-radius: 16px; 
      border-left: 8px solid #ff8c00;
      max-width: 850px;
    }
    .mesa { font-size: 1.9rem; font-weight: bold; color: #ff8c00; }
    .complete-btn { 
      background: #22c55e; 
      color: black; 
      padding: 14px 32px; 
      border: none; 
      border-radius: 10px; 
      font-weight: bold;
      font-size: 1.1rem;
    }
    .note { color: #ffcc80; }
  </style>
</head>
<body>
  <h1>🍔 Panel de Cocina - Burger 817</h1>
  <p style="text-align:center; color:#aaa;">Pedidos pendientes</p>
  
  <div id="orders"></div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyCIDAaZY0g3EQ6a_iPhyt87_3QXj30p6zY",
      authDomain: "muelle817-c62df.firebaseapp.com",
      databaseURL: "https://muelle817-c62df-default-rtdb.firebaseio.com",
      projectId: "muelle817-c62df",
      storageBucket: "muelle817-c62df.firebasestorage.app",
      messagingSenderId: "641825272212",
      appId: "1:641825272212:web:b96a054561398eaf22df81"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function loadOrders() {
      db.ref('pedidos').on('value', snapshot => {
        const ordersDiv = document.getElementById('orders');
        ordersDiv.innerHTML = '';

        if (!snapshot.exists()) {
          ordersDiv.innerHTML = `<p style="text-align:center; padding:60px; color:#666;">No hay pedidos pendientes</p>`;
          return;
        }

        let ordersArray = [];
        snapshot.forEach(child => {
          ordersArray.push({ id: child.key, ...child.val() });
        });

        ordersArray.sort((a, b) => b.id - a.id);

        ordersArray.forEach(order => {
          let itemsHtml = order.items.map(item => `
            <div class="py-2 border-b border-gray-700">
              <strong>${item.quantity} × ${item.name}</strong>
              ${item.note ? `<p class="note text-sm">📝 ${item.note}</p>` : ''}
            </div>
          `).join('');

          ordersDiv.innerHTML += `
            <div class="order">
              <div class="flex justify-between items-start">
                <div>
                  <span class="mesa">MESA ${order.mesa}</span><br>
                  <small>${order.timestamp}</small>
                </div>
                <button class="complete-btn" onclick="marcarListo('${order.id}')">
                  <i class="fas fa-check"></i> LISTO
                </button>
              </div>
              <div style="margin:15px 0;">${itemsHtml}</div>
              <strong>Total: $${order.total}</strong>
            </div>`;
        });
      });
    }

    // Función clave: Mover pedido de Cocina a Caja
    function marcarListo(orderId) {
      if (confirm("¿Marcar como LISTO y enviar a Caja?")) {
        db.ref('pedidos/' + orderId).once('value', snapshot => {
          const order = snapshot.val();
          
          // Guardar en pedidosListos (para Caja)
          db.ref('pedidosListos/' + orderId).set(order)
            .then(() => {
              // Eliminar de pedidos (Cocina)
              db.ref('pedidos/' + orderId).remove();
              alert("Pedido enviado a Caja correctamente");
            });
        });
      }
    }

    loadOrders();
  </script>
</body>
</html>
