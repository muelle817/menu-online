<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Muelle 817 • Menú Digital</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@400;500&display=swap');
        
        body {
            font-family: 'Poppins', sans-serif;
            background-image: url('FONDOT.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: white;
        }
        .logo-font { 
            font-family: 'Playfair Display', serif; 
        }
        
        h1, h2, h3, p, span, div {
            color: white;
        }
        
        .category-card:hover { transform: scale(1.05); transition: all 0.6s ease; }
        
        .modal {
            opacity: 0;
            transform: scale(0.95);
            transition: all 0.4s ease;
        }
        .modal.show { opacity: 1; transform: scale(1); }
        
        .close-modal {
            position: sticky;
            top: 20px;
            right: 20px;
            z-index: 50;
            font-size: 3rem;
            color: #fff;
        }
        .add-btn {
            background: #ff8c00;
            color: black;
            padding: 6px 16px;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: bold;
        }
        .remove-btn {
            background: #e74c3c;
            color: white;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
<header class="fixed top-0 left-0 right-0 z-50 bg-black/70 backdrop-blur-xl">
    <div class="max-w-5xl mx-auto px-4 py-4 flex items-center justify-between">
        <img src="logo.png" alt="Muelle 817" class="h-16">
        <button onclick="openCart()" class="relative text-3xl hover:text-orange-400 transition">
            🛒 <span id="cart-count" class="absolute -top-1 -right-1 bg-orange-500 text-black text-xs font-bold w-6 h-6 rounded-full flex items-center justify-center">0</span>
        </button>
    </div>
</header>

<main class="pt-28 pb-20 px-4 max-w-5xl mx-auto">
    <h1 class="logo-font text-5xl sm:text-6xl text-center text-[#ff8c00] mb-12 tracking-widest">MUELLE 817</h1>
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6" id="categories"></div>
</main>

<!-- MODAL -->
<div id="modal" class="modal fixed inset-0 z-50 hidden flex items-center justify-center p-4 bg-black/80">
    <div class="modal-content rounded-3xl w-full max-w-2xl max-h-[92vh] overflow-hidden relative border border-white/20 shadow-2xl">
        <button onclick="closeModal()" class="close-modal">×</button>
        <div class="p-8 overflow-y-auto max-h-[85vh]" id="modal-content"></div>
    </div>
</div>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyCIDAaZY0g3EQ6a_iPhyt87_3QXj30p6zY",
      authDomain: "muelle817-c62df.firebaseapp.com",
      databaseURL: "https://muelle817-c62df-default-rtdb.firebaseio.com",
      projectId: "muelle817-c62df",
      storageBucket: "muelle817-c62df.firebasestorage.app",
      messagingSenderId: "641825272212",
      appId: "1:641825272212:web:b96a054561398eaf22df81"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let cart = [];

    const categories = [
        {id:"tostadas", name:"TOSTADAS", img:"TOSTADAS.png"},
        {id:"ceviche", name:"CEVICHES", img:"CEVICHES.png"},
        {id:"tacos", name:"TACOS", img:"TACOS.png"},
        {id:"filetes", name:"FILETES", img:"FILETES.png"},
        {id:"camarones", name:"CAMARONES", img:"PLATILLOS_DE_CAMARONES.png"},
        {id:"especialidades", name:"ESPECIALIDADES", img:"MOLCAJETES.png"},
        {id:"mocktails", name:"MOCKTAILS", img:"BEBIDAS.png"},
        {id:"cocktails", name:"CLASSIC COCKTAILS", img:"COCKTELES.png"},
        {id:"bebidas", name:"BEBIDAS", img:"BEBIDAS.png"}
    ];

    function renderCategories() {
        document.getElementById('categories').innerHTML = categories.map(cat => `
            <button onclick="openCategory('${cat.id}')" class="category-card w-full aspect-video relative rounded-3xl overflow-hidden shadow-2xl">
                <img src="${cat.img}" class="w-full h-full object-cover">
                <div class="absolute inset-0 bg-gradient-to-t from-black/70 flex items-end pb-8">
                    <h2 class="logo-font text-4xl text-center w-full text-white drop-shadow-2xl">${cat.name}</h2>
                </div>
            </button>
        `).join('');
    }

    function openCategory(id) {
        let html = `<h2 class="logo-font text-5xl text-center mb-10 text-[#ff8c00]">${id.toUpperCase().replace(/_/g, ' ')}</h2><div class="space-y-6">`;

        // TOSTADAS
        if (id === "tostadas") {
            html += `
                <div class="flex justify-between items-center border-b border-white/20 pb-3"><span>Ceviche de Pescado</span><span class="text-orange-400">$85</span><button onclick="addToCart('Ceviche de Pescado',85)" class="add-btn ml-4">Agregar</button></div>
                <div class="flex justify-between items-center border-b border-white/20 pb-3"><span>Ceviche Mixto</span><span class="text-orange-400">$100</span><button onclick="addToCart('Ceviche Mixto',100)" class="add-btn ml-4">Agregar</button></div>
                <div class="flex justify-between items-center border-b border-white/20 pb-3"><span>Camarón</span><span class="text-orange-400">$95</span><button onclick="addToCart('Camarón',95)" class="add-btn ml-4">Agregar</button></div>
                <div class="flex justify-between items-center border-b border-white/20 pb-3"><span>Tropical</span><span class="text-orange-400">$90</span><button onclick="addToCart('Tropical',90)" class="add-btn ml-4">Agregar</button></div>
                <div class="flex justify-between items-center border-b border-white/20 pb-3"><span>Ceviche Pulpo</span><span class="text-orange-400">$110</span><button onclick="addToCart('Ceviche Pulpo',110)" class="add-btn ml-4">Agregar</button></div>
                <div class="flex justify-between items-center border-b border-white/20 pb-3"><span>Ceviche Mitotero</span><span class="text-orange-400">$130</span><button onclick="addToCart('Ceviche Mitotero',130)" class="add-btn ml-4">Agregar</button></div>
                <div class="flex justify-between items-center border-b border-white/20 pb-3"><span>Caribeña</span><span class="text-orange-400">$90</span><button onclick="addToCart('Caribeña',90)" class="add-btn ml-4">Agregar</button></div>
                <div class="flex justify-between items-center border-b border-white/20 pb-3"><span>Callo de Hacha</span><span class="text-orange-400">$175</span><button onclick="addToCart('Callo de Hacha',175)" class="add-btn ml-4">Agregar</button></div>
                <div class="flex justify-between items-center border-b border-white/20 pb-3"><span>Atún Fresco</span><span class="text-orange-400">$115</span><button onclick="addToCart('Atún Fresco',115)" class="add-btn ml-4">Agregar</button></div>
                <div class="flex justify-between items-center border-b border-white/20 pb-3"><span>Cubana</span><span class="text-orange-400">$110</span><button onclick="addToCart('Cubana',110)" class="add-btn ml-4">Agregar</button></div>`;
        }

        // CEVICHES
        if (id === "ceviche") {
            html += `
                <div class="flex justify-between items-center border-b border-white/20 pb-3"><span>Pescado</span><span class="text-orange-400">$200</span><button onclick="addToCart('Pescado',200)" class="add-btn ml-4">Agregar</button></div>
                <div class="flex justify-between items-center border-b border-white/20 pb-3"><span>Camarón</span><span class="text-orange-400">$220</span><button onclick="addToCart('Camarón',220)" class="add-btn ml-4">Agregar</button></div>
                <div class="flex justify-between items-center border-b border-white/20 pb-3"><span>Pulpo</span><span class="text-orange-400">$250</span><button onclick="addToCart('Pulpo',250)" class="add-btn ml-4">Agregar</button></div>
                <div class="flex justify-between items-center border-b border-white/20 pb-3"><span>Mixto</span><span class="text-orange-400">$230</span><button onclick="addToCart('Mixto',230)" class="add-btn ml-4">Agregar</button></div>
                <div class="flex justify-between items-center border-b border-white/20 pb-3"><span>Tropical</span><span class="text-orange-400">$230</span><button onclick="addToCart('Tropical',230)" class="add-btn ml-4">Agregar</button></div>
                <div class="flex justify-between items-center border-b border-white/20 pb-3"><span>Mitotero</span><span class="text-orange-400">$280</span><button onclick="addToCart('Mitotero',280)" class="add-btn ml-4">Agregar</button></div>
                <div class="flex justify-between items-center border-b border-white/20 pb-3"><span>Caribeño</span><span class="text-orange-400">$240</span><button onclick="addToCart('Caribeño',240)" class="add-btn ml-4">Agregar</button></div>`;
        }

        // TACOS
        if (id === "tacos") {
            html += `
                <div class="flex justify-between items-center border-b border-white/20 pb-3"><span>Marlín con Queso</span><span class="text-orange-400">$80</span><button onclick="addToCart('Marlín con Queso',80)" class="add-btn ml-4">Agregar</button></div>
                <div class="flex justify-between items-center border-b border-white/20 pb-3"><span>Camarón con Queso</span><span class="text-orange-400">$95</span><button onclick="addToCart('Camarón con Queso',95)" class="add-btn ml-4">Agregar</button></div>
                <div class="flex justify-between items-center border-b border-white/20 pb-3"><span>Pulpo con Queso</span><span class="text-orange-400">$110</span><button onclick="addToCart('Pulpo con Queso',110)" class="add-btn ml-4">Agregar</button></div>
                <div class="flex justify-between items-center border-b border-white/20 pb-3"><span>Huérfano de Camarón</span><span class="text-orange-400">$120</span><button onclick="addToCart('Huérfano de Camarón',120)" class="add-btn ml-4">Agregar</button></div>
                <div class="flex justify-between items-center border-b border-white/20 pb-3"><span>Muelle 817</span><span class="text-orange-400">$115</span><button onclick="addToCart('Muelle 817',115)" class="add-btn ml-4">Agregar</button></div>
                <div class="flex justify-between items-center border-b border-white/20 pb-3"><span>Bichi</span><span class="text-orange-400">$140</span><button onclick="addToCart('Bichi',140)" class="add-btn ml-4">Agregar</button></div>
                <div class="flex justify-between items-center border-b border-white/20 pb-3"><span>Gobernador</span><span class="text-orange-400">$120</span><button onclick="addToCart('Gobernador',120)" class="add-btn ml-4">Agregar</button></div>`;
        }

        // BEBIDAS
        if (id === "mocktails") {
            html += `
                <div class="flex justify-between items-center border-b border-white/20 pb-3"><span>Fresa Jengibre</span><span class="text-orange-400">$110</span><button onclick="addToCart('Fresa Jengibre',110)" class="add-btn ml-4">Agregar</button></div>
                <div class="flex justify-between items-center border-b border-white/20 pb-3"><span>Frutos Rojos</span><span class="text-orange-400">$100</span><button onclick="addToCart('Frutos Rojos',100)" class="add-btn ml-4">Agregar</button></div>
                <div class="flex justify-between items-center border-b border-white/20 pb-3"><span>Frutos Lychee</span><span class="text-orange-400">$120</span><button onclick="addToCart('Frutos Lychee',120)" class="add-btn ml-4">Agregar</button></div>
                <div class="flex justify-between items-center border-b border-white/20 pb-3"><span>Pepino Fresh</span><span class="text-orange-400">$120</span><button onclick="addToCart('Pepino Fresh',120)" class="add-btn ml-4">Agregar</button></div>
                <div class="flex justify-between items-center border-b border-white/20 pb-3"><span>Maracuyá</span><span class="text-orange-400">$130</span><button onclick="addToCart('Maracuyá',130)" class="add-btn ml-4">Agregar</button></div>`;
        }

        if (id === "cocktails") {
            html += `
                <div class="flex justify-between items-center border-b border-white/20 pb-3"><span>Margarita</span><span class="text-orange-400">$170</span><button onclick="addToCart('Margarita',170)" class="add-btn ml-4">Agregar</button></div>
                <div class="flex justify-between items-center border-b border-white/20 pb-3"><span>Negroni</span><span class="text-orange-400">$180</span><button onclick="addToCart('Negroni',180)" class="add-btn ml-4">Agregar</button></div>
                <div class="flex justify-between items-center border-b border-white/20 pb-3"><span>Old Fashion</span><span class="text-orange-400">$180</span><button onclick="addToCart('Old Fashion',180)" class="add-btn ml-4">Agregar</button></div>
                <div class="flex justify-between items-center border-b border-white/20 pb-3"><span>Martini</span><span class="text-orange-400">$180</span><button onclick="addToCart('Martini',180)" class="add-btn ml-4">Agregar</button></div>
                <div class="flex justify-between items-center border-b border-white/20 pb-3"><span>Aperol Spritz</span><span class="text-orange-400">$150</span><button onclick="addToCart('Aperol Spritz',150)" class="add-btn ml-4">Agregar</button></div>
                <div class="flex justify-between items-center border-b border-white/20 pb-3"><span>Piña Colada</span><span class="text-orange-400">$145</span><button onclick="addToCart('Piña Colada',145)" class="add-btn ml-4">Agregar</button></div>
                <div class="flex justify-between items-center border-b border-white/20 pb-3"><span>Mojito</span><span class="text-orange-400">$160</span><button onclick="addToCart('Mojito',160)" class="add-btn ml-4">Agregar</button></div>`;
        }

        if (id === "bebidas") {
            html += `
                <div class="flex justify-between items-center border-b border-white/20 pb-3"><span>Limonada Natural</span><span class="text-orange-400">$70</span><button onclick="addToCart('Limonada Natural',70)" class="add-btn ml-4">Agregar</button></div>
                <div class="flex justify-between items-center border-b border-white/20 pb-3"><span>Refrescos</span><span class="text-orange-400">$45</span><button onclick="addToCart('Refrescos',45)" class="add-btn ml-4">Agregar</button></div>
                <div class="flex justify-between items-center border-b border-white/20 pb-3"><span>Corona</span><span class="text-orange-400">$45</span><button onclick="addToCart('Corona',45)" class="add-btn ml-4">Agregar</button></div>`;
        }

        html += `</div>`;
        document.getElementById('modal-content').innerHTML = html;
        document.getElementById('modal').classList.remove('hidden');
        setTimeout(() => document.getElementById('modal').classList.add('show'), 50);
    }

    function closeModal() {
        const modal = document.getElementById('modal');
        modal.classList.remove('show');
        setTimeout(() => modal.classList.add('hidden'), 400);
    }

    function addToCart(name, price) {
        cart.push({name, price});
        document.getElementById('cart-count').textContent = cart.length;
    }

    function openCart() {
        let html = `<h2 class="logo-font text-4xl mb-6 text-center">Tu Carrito</h2>`;
        let total = 0;
        cart.forEach((item, index) => {
            total += item.price;
            html += `<div class="flex justify-between py-3 border-b border-white/20">
                        <span>${item.name}</span>
                        <div class="flex items-center gap-3">
                            <span class="font-bold">$${item.price}</span>
                            <button onclick="removeFromCart(${index})" class="remove-btn">Eliminar</button>
                        </div>
                    </div>`;
        });
        html += `<div class="text-2xl font-bold mt-8 text-center">Total: $${total}</div>`;
        html += `<button onclick="confirmOrder()" class="w-full mt-6 bg-green-600 hover:bg-green-700 py-4 rounded-2xl text-xl font-bold">Confirmar y Enviar Pedido</button>`;
        document.getElementById('modal-content').innerHTML = html;
        document.getElementById('modal').classList.remove('hidden');
        setTimeout(() => document.getElementById('modal').classList.add('show'), 50);
    }

    function removeFromCart(index) {
        cart.splice(index, 1);
        document.getElementById('cart-count').textContent = cart.length;
        openCart();
    }

    function confirmOrder() {
        if (cart.length === 0) return alert("El carrito está vacío");
        const mesa = prompt("Número de mesa o nombre del cliente:", "Mesa 5");
        if (!mesa) return;

        const order = {
            id: Date.now(),
            mesa: mesa,
            items: cart,
            total: cart.reduce((sum, i) => sum + i.price, 0),
            timestamp: new Date().toLocaleString('es-MX')
        };

        db.ref('pedidos/' + order.id).set(order).then(() => {
            alert("✅ Pedido enviado a cocina correctamente");
            cart = [];
            document.getElementById('cart-count').textContent = 0;
            closeModal();
        });
    }

    renderCategories();
</script>
</body>
</html>
